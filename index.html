<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad-Master: 50 Challenges</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
        body { font-family: 'Fredoka', sans-serif; background: #f0f4f8; }
        .gradient-main { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .answer-btn { transition: all 0.2s border-box; }
        .answer-btn:active { transform: scale(0.98); }
        .progress-fill { transition: width 0.4s ease-out; }
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div id="app" class="max-w-2xl w-full">
    <!-- Start Screen -->
    <div id="start-screen" class="bg-white rounded-[2rem] shadow-2xl p-10 text-center border-b-8 border-indigo-200">
        <div class="text-8xl mb-6">🏆</div>
        <h1 class="text-4xl font-bold text-indigo-900 mb-4">Ad-Master 50</h1>
        <p class="text-slate-600 mb-8 text-lg">Bisakah kamu menyelesaikan 50 tantangan iklan bahasa Inggris dan menjadi Direktur Kreatif?</p>
        <button onclick="initGame()" class="gradient-main text-white px-12 py-4 rounded-2xl font-bold text-xl shadow-lg hover:shadow-indigo-300 transition-all hover:-translate-y-1">
            MULAI PERMAINAN
        </button>
        <p class="mt-6 text-xs text-slate-400 uppercase tracking-widest font-bold">Musik akan dimulai secara otomatis</p>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="hidden">
        <div class="bg-white rounded-[2rem] shadow-2xl overflow-hidden border-b-8 border-indigo-100">
            <!-- Progress Header -->
            <div class="bg-slate-50 p-6 flex justify-between items-center border-b border-slate-100">
                <div class="flex flex-col">
                    <span id="question-count" class="text-indigo-600 font-bold text-sm uppercase tracking-tighter">Question 1/50</span>
                    <div class="w-48 h-3 bg-slate-200 rounded-full mt-1">
                        <div id="progress-bar" class="progress-fill h-full gradient-main rounded-full" style="width: 2%"></div>
                    </div>
                </div>
                <div class="text-right">
                    <span class="block text-xs font-bold text-slate-400 uppercase">Current Score</span>
                    <span id="score-val" class="text-2xl font-black text-slate-800">0</span>
                </div>
            </div>

            <!-- Question Area -->
            <div id="quiz-body" class="p-8">
                <div id="question-text" class="text-2xl font-bold text-slate-800 mb-8 leading-snug">
                    Loading question...
                </div>
                <div id="options-grid" class="grid gap-4">
                    <!-- Options dynamic -->
                </div>
            </div>

            <!-- Sound Toggle -->
            <div class="p-4 bg-slate-50 flex justify-center">
                <button onclick="toggleMusic()" id="music-toggle" class="text-slate-400 text-sm font-bold flex items-center gap-2">
                    <span id="music-icon">🎵</span> Music ON
                </button>
            </div>
        </div>
    </div>

    <!-- Final Result -->
    <div id="final-screen" class="hidden bg-white rounded-[2rem] shadow-2xl p-10 text-center">
        <div id="final-emoji" class="text-8xl mb-4">👑</div>
        <h2 class="text-3xl font-bold text-slate-800 mb-2">Game Completed!</h2>
        <p class="text-slate-500 mb-6">Skor akhir kamu:</p>
        <div id="final-score" class="text-7xl font-black text-indigo-600 mb-8">0</div>
        <div id="rank-badge" class="inline-block px-8 py-3 rounded-full bg-indigo-50 text-indigo-700 font-bold mb-8">
            MASTER DIRECTOR
        </div>
        <button onclick="location.reload()" class="block w-full py-4 gradient-main text-white font-bold rounded-2xl shadow-xl">
            MAIN LAGI
        </button>
    </div>
</div>

<script>
    // --- AUDIO SYSTEM (Procedural Music) ---
    let audioCtx;
    let isMusicPlaying = false;
    let musicLoop;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playTone(freq, duration, type = 'sine', volume = 0.1) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function startBGM() {
        if (isMusicPlaying) return;
        isMusicPlaying = true;
        const melody = [261, 329, 392, 523, 392, 329]; // C Major arpeggio
        let i = 0;
        musicLoop = setInterval(() => {
            playTone(melody[i % melody.length], 0.5, 'triangle', 0.03);
            i++;
        }, 600);
    }

    function toggleMusic() {
        if(isMusicPlaying) {
            clearInterval(musicLoop);
            isMusicPlaying = false;
            document.getElementById('music-icon').innerText = '🔇';
            document.getElementById('music-toggle').classList.add('text-red-400');
        } else {
            startBGM();
            document.getElementById('music-icon').innerText = '🎵';
            document.getElementById('music-toggle').classList.remove('text-red-400');
        }
    }

    // --- GAME DATA (50 Questions) ---
    // Dipecah menjadi kategori agar lebih mudah dikelola
    const questions = [
        // 1-10: Basic Vocab & Purpose
        { q: "What is the main purpose of an advertisement?", a: ["To entertain", "To persuade", "To inform news", "To tell a story"], correct: 1 },
        { q: "In an ad, '50% Off' is an example of...", a: ["Headline", "Special Offer", "Brand Name", "Contact"], correct: 1 },
        { q: "Which word is a common persuasive adjective?", a: ["Bad", "Exclusive", "Slow", "Ordinary"], correct: 1 },
        { q: "A short, catchy phrase in an ad is called a...", a: ["Paragraph", "Slogan", "Address", "Signature"], correct: 1 },
        { q: "Advertisements are usually found in...", a: ["Textbooks", "Social Media", "Science Journals", "Letters"], correct: 1 },
        { q: "What does 'Limited Time Only' mean?", a: ["The item is expensive", "Hurry, the offer will end", "The store is closed", "Free forever"], correct: 1 },
        { q: "Target audience means...", a: ["The people the ad is for", "The people who make ads", "The shop owner", "The product name"], correct: 0 },
        { q: "Which one is an advertisement for a service?", a: ["Burger King", "Laundry Express", "Nike Shoes", "Coca Cola"], correct: 1 },
        { q: "The text 'Call 123-456' is part of...", a: ["Price", "Contact information", "Visual", "Headline"], correct: 1 },
        { q: "Why do ads use bright colors?", a: ["To be expensive", "To attract attention", "To be dark", "To be boring"], correct: 1 },

        // 11-20: Headlines & Language
        { q: "Choose the best headline for a new energy drink:", a: ["We sell drinks.", "Ignite your power!", "Buy this liquid.", "It is sweet."], correct: 1 },
        { q: "Which sentence uses an Imperative verb?", a: ["The car is fast.", "Buy one now!", "We have a sale.", "I like ads."], correct: 1 },
        { q: "An advertisement should be...", a: ["Long and complex", "Clear and catchy", "Boring and gray", "Very quiet"], correct: 1 },
        { q: "What is the synonym of 'Persuade'?", a: ["Force", "Convince", "Ask", "Tell"], correct: 1 },
        { q: "'Unbelievable prices!' is an example of...", a: ["Exaggeration", "Fact", "Bad grammar", "Name"], correct: 0 },
        { q: "Which product matches the slogan 'Fresh from the farm'?", a: ["Laptop", "Milk", "Car", "Shampoo"], correct: 1 },
        { q: "What is 'Buy 1 Get 1 Free' commonly called?", a: ["Promo", "Tax", "Price tag", "Recipe"], correct: 0 },
        { q: "Choose the most persuasive adjective for a pillow:", a: ["Heavy", "Ultra-soft", "Square", "Used"], correct: 1 },
        { q: "Ads often use 'Power Words'. Which is a power word?", a: ["Maybe", "Free", "Okay", "Average"], correct: 1 },
        { q: "The image in an ad is called...", a: ["Audio", "Visual", "Copy", "Script"], correct: 1 },

        // 21-30: Structures & Types
        { q: "The 'Headline' is usually placed at the...", a: ["Bottom", "Top", "Back", "Middle"], correct: 1 },
        { q: "What is a 'Testimonial'?", a: ["A price list", "Customer review", "Product color", "The logo"], correct: 1 },
        { q: "Which one is a Print Ad?", a: ["Radio spot", "Magazine ad", "YouTube video", "Podcast ad"], correct: 1 },
        { q: "What does 'Affordable' mean?", a: ["Cheap quality", "Good price", "Expensive", "Very old"], correct: 1 },
        { q: "A 'Logo' represents the...", a: ["Price", "Brand identity", "Product weight", "Date"], correct: 1 },
        { q: "Which ad category is 'Loker' (Lowongan Kerja)?", a: ["Product ad", "Job Vacancy ad", "Service ad", "Event ad"], correct: 1 },
        { q: "The phrase 'Best in the world' is often...", a: ["A proven fact", "A claim/opinion", "A law", "A name"], correct: 1 },
        { q: "A 'Call to Action' (CTA) tells the customer...", a: ["What to eat", "What to do next", "Who the boss is", "Where to sleep"], correct: 1 },
        { q: "Which is a CTA?", a: ["It is red.", "Shop now!", "The sun is hot.", "Welcome."], correct: 1 },
        { q: "Why are celebrities used in ads?", a: ["To make it cheaper", "To increase trust", "To be funny", "To use more colors"], correct: 1 },

        // 31-40: Context & Comparison
        { q: "A car ad focus on 'Fuel Efficiency'. It means...", a: ["It is fast", "It saves gasoline", "It is big", "It is expensive"], correct: 1 },
        { q: "Which is better for a snack ad?", a: ["Salty and dry", "Crunchy and tasty", "Small and brown", "Expensive"], correct: 1 },
        { q: "A 'Brochure' is a form of...", a: ["Audio ad", "Print ad", "Digital ad", "Public speaking"], correct: 1 },
        { q: "What is the opposite of 'High quality'?", a: ["Premium", "Standard", "Inferior", "Modern"], correct: 2 },
        { q: "If an ad says 'Save up to 70%', the maximum discount is...", a: ["10%", "50%", "70%", "100%"], correct: 2 },
        { q: "'Guaranteed for 2 years' is a...", a: ["Price", "Warranty", "Slogan", "Name"], correct: 1 },
        { q: "Which language feature is common in ads?", a: ["Passive voice", "Direct speech/Imperatives", "Old English", "Medical terms"], correct: 1 },
        { q: "Commercial ads aim to...", a: ["Make profit", "Give charity", "Educate only", "Hide information"], correct: 0 },
        { q: "What is 'Endorsement'?", a: ["Buying a product", "Public support by a famous person", "A discount", "A complaint"], correct: 1 },
        { q: "Which is a 'Social Ad'?", a: ["Buy a phone", "Stop smoking campaign", "New pizza sale", "Watch a movie"], correct: 1 },

        // 41-50: Advanced & Final
        { q: "What is 'Branding'?", a: ["Writing a price", "Creating a unique image for a product", "Destroying a product", "Hiding the name"], correct: 1 },
        { q: "'Just Do It' is a slogan for...", a: ["Adidas", "Nike", "Puma", "Reebok"], correct: 1 },
        { q: "Which media has the widest reach for ads?", a: ["Pamphlets", "The Internet", "School board", "Loudspeaker"], correct: 1 },
        { q: "An ad for a resort would use words like...", a: ["Stressful", "Luxurious and Relaxing", "Dirty", "Busy"], correct: 1 },
        { q: "What does 'Available in various colors' mean?", a: ["Only one color", "Many color choices", "No colors", "Black and white only"], correct: 1 },
        { q: "Which one is NOT a part of an ad?", a: ["Headline", "Visual", "Signature of the principal", "Contact"], correct: 2 },
        { q: "The tone of an ad is usually...", a: ["Sorrowful", "Optimistic and Energetic", "Angry", "Fearful"], correct: 1 },
        { q: "Ads on websites that pop up are called...", a: ["Posters", "Pop-up ads", "Billboards", "Newspapers"], correct: 1 },
        { q: "To 'Stand out from the crowd' means...", a: ["To be the same", "To be different and better", "To be invisible", "To be cheap"], correct: 1 },
        { q: "Final Mastery: An advertisement is a... text.", a: ["Narrative", "Persuasive", "Descriptive (only)", "Procedure"], correct: 1 }
    ];

    let currentIdx = 0;
    let score = 0;

    function initGame() {
        initAudio();
        startBGM();
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const q = questions[currentIdx];
        document.getElementById('question-count').innerText = `Question ${currentIdx + 1}/50`;
        document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / 50) * 100}%`;
        document.getElementById('question-text').innerText = q.q;
        
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = "answer-btn w-full p-5 text-left border-2 border-slate-100 rounded-2xl hover:border-indigo-500 hover:bg-indigo-50 font-semibold text-slate-700 bg-white shadow-sm";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, btn);
            grid.appendChild(btn);
        });
    }

    function checkAnswer(idx, btn) {
        const correct = questions[currentIdx].correct;
        const allBtns = document.querySelectorAll('.answer-btn');
        
        // Disable all buttons
        allBtns.forEach(b => b.onclick = null);

        if (idx === correct) {
            score += 20; // 20 * 50 = 1000 max score
            btn.classList.replace('border-slate-100', 'border-green-500');
            btn.classList.add('bg-green-50');
            playTone(880, 0.2, 'sine', 0.1); // Ding
            setTimeout(() => playTone(1100, 0.3, 'sine', 0.05), 100);
        } else {
            btn.classList.replace('border-slate-100', 'border-red-500');
            btn.classList.add('bg-red-50', 'shake');
            allBtns[correct].classList.replace('border-slate-100', 'border-green-500');
            playTone(150, 0.4, 'sawtooth', 0.1); // Buzz
        }

        document.getElementById('score-val').innerText = score;

        setTimeout(() => {
            currentIdx++;
            if (currentIdx < questions.length) {
                loadQuestion();
            } else {
                showFinal();
            }
        }, 1200);
    }

    function showFinal() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('final-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
        
        const badge = document.getElementById('rank-badge');
        if(score >= 900) badge.innerText = "GRAND MASTER DIRECTOR 👑";
        else if(score >= 700) badge.innerText = "SENIOR COPYWRITER ✍️";
        else if(score >= 400) badge.innerText = "ADVERTISING INTERN 📑";
        else badge.innerText = "CONSUMER ONLY 🛒";
    }
</script>

</body>
</html>
